<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 产品日报 · 加载中...</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #181825;
            --border: #2a2a3c;
            --border-light: #1f1f30;
            --text: #e4e4ef;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* ── Top Bar ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
        }
        .topbar-inner {
            max-width: 820px; margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            color: var(--text-secondary); text-decoration: none; font-size: 0.88rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .topbar-date {
            font-size: 0.82rem; color: var(--text-muted);
        }

        /* ── Article ── */
        .article-wrap {
            max-width: 820px; margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
        }

        /* ── Markdown Styles ── */
        .article-wrap h1 {
            font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em;
            margin-bottom: 0.5rem; line-height: 1.3;
        }
        .article-wrap h2 {
            font-size: 1.3rem; font-weight: 700;
            margin-top: 2.5rem; margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .article-wrap h3 {
            font-size: 1.1rem; font-weight: 600;
            margin-top: 2rem; margin-bottom: 0.6rem;
            color: var(--text);
        }
        .article-wrap h4 {
            font-size: 1rem; font-weight: 600;
            margin-top: 1.5rem; margin-bottom: 0.4rem;
        }

        .article-wrap p {
            margin-bottom: 1rem; color: var(--text-secondary);
            font-size: 0.95rem; line-height: 1.8;
        }

        .article-wrap strong {
            color: var(--text); font-weight: 600;
        }

        .article-wrap blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.8rem 1.2rem; margin: 1.5rem 0;
            background: var(--accent-soft);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary); font-size: 0.92rem;
        }
        .article-wrap blockquote p { margin-bottom: 0.3rem; }

        .article-wrap ul, .article-wrap ol {
            margin: 1rem 0; padding-left: 1.5rem;
            color: var(--text-secondary);
        }
        .article-wrap li { margin-bottom: 0.4rem; font-size: 0.95rem; }
        .article-wrap li strong { color: var(--text); }

        .article-wrap a {
            color: var(--accent); text-decoration: none;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            transition: border-color 0.2s;
        }
        .article-wrap a:hover { border-color: var(--accent); }

        .article-wrap img {
            max-width: 100%; border-radius: 12px;
            margin: 1.5rem 0; border: 1px solid var(--border);
        }

        .article-wrap hr {
            border: none; border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        /* Inline code */
        .article-wrap code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-card); padding: 0.15rem 0.45rem;
            border-radius: 4px; font-size: 0.85rem;
            color: #c4b5fd;
        }

        /* Code blocks */
        .article-wrap pre {
            background: var(--bg-card) !important;
            border: 1px solid var(--border);
            border-radius: 12px; padding: 1.2rem 1.5rem;
            margin: 1.5rem 0; overflow-x: auto;
        }
        .article-wrap pre code {
            background: none; padding: 0;
            color: var(--text-secondary); font-size: 0.85rem;
            line-height: 1.6;
        }

        /* Tables */
        .article-wrap table {
            width: 100%; border-collapse: collapse;
            margin: 1.5rem 0; font-size: 0.9rem;
        }
        .article-wrap th {
            background: var(--bg-card);
            padding: 0.7rem 1rem; text-align: left;
            font-weight: 600; color: var(--text);
            border-bottom: 2px solid var(--border);
        }
        .article-wrap td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary);
        }
        .article-wrap tr:hover td {
            background: var(--bg-card);
        }

        /* ── Loading ── */
        .loading {
            text-align: center; padding: 6rem 2rem;
            color: var(--text-muted);
        }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        .error {
            text-align: center; padding: 6rem 2rem;
        }
        .error h2 { color: #f87171; margin-bottom: 0.5rem; }
        .error p { color: var(--text-muted); }
        .error a { color: var(--accent); text-decoration: none; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .article-wrap { padding: 1.5rem 1.2rem 3rem; }
            .article-wrap h1 { font-size: 1.4rem; }
            .article-wrap h2 { font-size: 1.15rem; }
            .topbar-inner { padding: 0.8rem 1.2rem; }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="topbar-inner">
        <a href="./index.html" class="back-link">← 返回日报列表</a>
        <span class="topbar-date" id="topbar-date"></span>
    </div>
</div>

<!-- Content -->
<div id="content">
    <div class="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>
</div>

<script>
// Parse query param
const params = new URLSearchParams(window.location.search);
const filePath = params.get('f');

if (!filePath) {
    document.getElementById('content').innerHTML = `
        <div class="error">
            <h2>未指定文件</h2>
            <p><a href="./index.html">返回日报列表</a></p>
        </div>`;
} else {
    // Update title
    const dateMatch = filePath.match(/(\d{4}-\d{2}-\d{2})/);
    if (dateMatch) {
        document.title = `AI 产品日报 · ${dateMatch[1]}`;
        document.getElementById('topbar-date').textContent = dateMatch[1];
    }

    fetch('./' + filePath)
        .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.text();
        })
        .then(md => {
            // Configure marked
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });

            const html = marked.parse(md);
            document.getElementById('content').innerHTML =
                `<div class="article-wrap">${html}</div>`;

            // Extract date from content title
            const h1 = document.querySelector('.article-wrap h1');
            if (h1) {
                document.title = h1.textContent;
            }
        })
        .catch(err => {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>加载失败</h2>
                    <p>${err.message}</p>
                    <p style="margin-top:1rem"><a href="./index.html">返回日报列表</a></p>
                </div>`;
        });
}
</script>
</body>
</html>
